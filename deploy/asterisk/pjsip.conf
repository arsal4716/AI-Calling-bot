; =============================================================
; pjsip.conf — AI Bot server (76.13.192.150)  — NO TWILIO
; Only two SIP relationships remain, both with VICIdial (144.76.120.120):
;   • vicidial-endpoint  : inbound calls FROM VICIdial (exten 77777)
;   • vicidial-outbound  : outbound leg TO VICIdial when transferring an agent
; All Twilio endpoints/identifies/auth have been removed.
; =============================================================

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_signaling_address=76.13.192.150
external_media_address=76.13.192.150
allow_reload=yes

; -------------------------------------------------------------
; VICIDIAL — inbound (IP-identified, all agents share this endpoint)
; -------------------------------------------------------------
[vicidial-endpoint]
type=endpoint
transport=transport-udp
context=from-vicidial
disallow=all
allow=ulaw,alaw
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes

[vicidial-aor]
type=aor
max_contacts=50
qualify_frequency=60

[vicidial-identify]
type=identify
endpoint=vicidial-endpoint
match=144.76.120.120/32

; -------------------------------------------------------------
; VICIDIAL — outbound (used by AriService to dial the agent back with
; the real customer CallerID). Points at the VICIdial server.
; -------------------------------------------------------------
[vicidial-outbound-aor]
type=aor
contact=sip:144.76.120.120:5060

[vicidial-outbound]
type=endpoint
transport=transport-udp
context=from-vicidial
disallow=all
allow=ulaw,alaw
aors=vicidial-outbound-aor
direct_media=no
rewrite_contact=yes
rtp_symmetric=yes
force_rport=yes
