; =============================================================
; extensions.conf — AI Bot server (76.13.192.150)  — NO TWILIO
; VICIdial dials SIP/77777@Testpeers → exten 77777 → Stasis(ai-bot)
; The Node app (services/AriService.js) owns the call via ARI.
; =============================================================

[general]
static=yes
writeprotect=no
clearglobalvars=no

[globals]
VICI_API=http://144.76.120.120/vicidial/non_agent_api.php
VICI_USER=15002
VICI_PASS=hello123456
VICI_SOURCE=acabots

; -------------------------------------------------------------
; Disposition normalizer (unchanged)
; -------------------------------------------------------------
[dispo-map]
exten => s,1,NoOp(DISPO NORMALIZE IN=${ARG1} HCAUSE=${ARG2})
 same => n,Set(OUT=${ARG1})
 same => n,ExecIf($["${OUT}"=""]?Set(OUT=THU))
 same => n,ExecIf($["${ARG2}"="16"]?Set(OUT=THU))
 same => n,ExecIf($["${ARG2}"="17"]?Set(OUT=THU))
 same => n,ExecIf($["${ARG2}"="18"]?Set(OUT=THU))
 same => n,ExecIf($["${ARG2}"="34"]?Set(OUT=DISCON))
 same => n,ExecIf($["${ARG2}"="38"]?Set(OUT=DISCON))
 same => n,ExecIf($["${OUT}"="ANSWER"]?Set(OUT=THU))
 same => n,ExecIf($["${OUT}"="BUSY"]?Set(OUT=THU))
 same => n,ExecIf($["${OUT}"="NOANSWER"]?Set(OUT=THU))
 same => n,ExecIf($["${OUT}"="CANCEL"]?Set(OUT=THU))
 same => n,ExecIf($["${OUT}"="CONGESTION"]?Set(OUT=DISCON))
 same => n,ExecIf($["${OUT}"="CHANUNAVAIL"]?Set(OUT=DISCON))
 same => n,ExecIf($["${OUT}"="XFER"]?Set(OUT=THU))
 same => n,NoOp(DISPO NORMALIZE OUT=${OUT})
 same => n,Return(${OUT})

; -------------------------------------------------------------
; VICIDIAL ENTRY POINT → Stasis(ai-bot)
; Args mirror what AriService reads: lead, agent, customer CallerID.
; MixMonitor records the call (replaces Twilio recording).
; -------------------------------------------------------------
[from-vicidial]
exten => 77777,1,NoOp(=== VICIDIAL CALL IN uid=${UNIQUEID} ===)
 same => n,Answer()
 same => n,Set(LEADID=${PJSIP_HEADER(read,X-VICIdial-Lead-Id)})
 same => n,ExecIf($["${LEADID}"=""]?Set(LEADID=${CALLERID(name)}))
 same => n,Set(CUSTID=${PJSIP_HEADER(read,X-VICIdial-Caller-Id)})
 same => n,ExecIf($["${CUSTID}"=""]?Set(CUSTID=${CALLERID(num)}))
 same => n,Set(AGENTUSER=${FILTER(0-9,${CALLERID(num)})})
 same => n,ExecIf($["${AGENTUSER}"=""]?Set(AGENTUSER=15001))
 same => n,Set(MY_LEADID=${LEADID})
 same => n,System(mkdir -p /tmp/ai_dispo)
 same => n,MixMonitor(${UNIQUEID}.wav)
 same => n,NoOp(=== ENTER STASIS lead=${LEADID} agent=${AGENTUSER} cust=${CUSTID} ===)
 ; First arg "inbound" tells AriService this is the caller leg (vs the agent
 ; transfer leg or the AudioSocket media leg). Keep it exactly as below.
 same => n,Stasis(ai-bot,inbound,${LEADID},${AGENTUSER},${CUSTID})
 same => n,Hangup()

; Hangup handler: push the AI disposition to VICIdial (unchanged logic).
exten => h,1,NoOp(=== HANGUP lead=${MY_LEADID} ===)
 same => n,Set(LEADID=${MY_LEADID})
 same => n,ExecIf($["${LEADID}"=""]?Set(LEADID=UNKNOWN))
 same => n,Set(DISPOFILE=/tmp/ai_dispo/lead_${LEADID})
 same => n,Set(AI_DISPO=${SHELL(cat ${DISPOFILE} 2>/dev/null | tr -d '\n\r\t ')})
 same => n,GotoIf($["${AI_DISPO}"!=""]?got_dispo)
 same => n,Wait(1)
 same => n,Set(AI_DISPO=${SHELL(cat ${DISPOFILE} 2>/dev/null | tr -d '\n\r\t ')})
 same => n(got_dispo),NoOp(AI_DISPO=${AI_DISPO})
 same => n,Set(FINALDISPO=${IF($["${AI_DISPO}"!=""]?${AI_DISPO}:THU)})
 same => n,GotoIf($["${LEADID}"="UNKNOWN"]?cleanup)
 same => n,Set(APIURL=${VICI_API}?source=${VICI_SOURCE}&user=${VICI_USER}&pass=${VICI_PASS}&function=update_lead&lead_id=${LEADID}&status=${FINALDISPO})
 same => n,System(/usr/bin/curl -sS --max-time 5 "${APIURL}" > /dev/null 2>&1)
 same => n,Set(LOGURL=${VICI_API}?source=${VICI_SOURCE}&user=${VICI_USER}&pass=${VICI_PASS}&function=update_log_entry&call_id=${LEADID}&group=1001&status=${FINALDISPO})
 same => n,System(/usr/bin/curl -sS --max-time 5 "${LOGURL}" > /dev/null 2>&1)
 same => n(cleanup),System(rm -f /tmp/ai_dispo/lead_${LEADID} /tmp/ai_dispo/active_${LEADID})
 same => n,Return()

; -------------------------------------------------------------
; Agent transfer is performed natively by AriService (it originates
; PJSIP/<agent>@vicidial-outbound with the real customer CallerID and
; bridges it). No dialplan context is required for the transfer.
; -------------------------------------------------------------
