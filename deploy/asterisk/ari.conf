; /etc/asterisk/ari.conf — enables the REST/WebSocket interface the Node app
; uses (services/AriService.js). The username/password here must match the
; ARI_USER / ARI_PASS env vars on the Node side.

[general]
enabled = yes
pretty = yes
allowed_origins = *

[ai-bot]
type = user
read_only = no
password = CHANGE_ME_STRONG_SECRET
